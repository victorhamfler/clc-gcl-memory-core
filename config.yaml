database_path: memory_experiment_180_best.db
embedding_dim: 768
logs_dir: logs
top_k: 8

server:
  host: 127.0.0.1
  port: 8765

embedding:
  backend: wsl_llama_cpp
  model_name: embeddinggemma-300M-Q8_0.gguf
  gguf_path: "\\wsl.localhost\\Ubuntu\\home\\victo\\models\\embeddinggemma-300M-Q8_0.gguf"
  wsl_model_path: /home/victo/models/embeddinggemma-300M-Q8_0.gguf
  gguf_n_ctx: 2048
  gguf_n_threads: 8
  wsl_python: /home/victo/.openclaw/workspace/module/.venv_mlcpu/bin/python
  dim: 768
  normalize: true
  max_text_chars: 1000
  sidecar: true
  cache_path: logs/embedding_cache.sqlite
  allow_hash_fallback: false

thresholds:
  low: 0.5
  new: 1.5
  recall_low: 0.45
  recall_mid: 0.65
  recall_high: 0.82
  contradiction: 0.75
  domain_shift: 0.60
  focus: 0.68
  information_gain: 0.45

gcl:
  base_update_rate: 0.18
  drift_beta: 0.95
  curvature_beta: 0.95
  angular_weight: 0.50
  radial_weight: 0.05
  orthogonal_weight: 0.35

retrieval_weights:
  vector: 0.38
  importance: 0.08
  stability: 0.08
  domain: 0.08
  text: 0.12
  intent: 0.14
  source: 0.18
  feedback: 0.10
  domain_reliability: 0.03
  source_reliability: 0.03
  supersession: 0.14
  relation_supersession: 0.16
  summary_relation: 0.08
  correction_chain: 0.12
  claim_scope: 0.14

selector:
  mode: learned
  k: 3
  matrix_report: selector_reports/clc_selector_guarded_continual_training_report.json
  outcome_log: ../experiments/hermes_clc_selector_outcome_labels.jsonl
  label_cost_ceiling: 0.00025
  high_budget_pressure: 0.9

outcome_log:
  enabled: true
  path: logs/memory_outcomes.jsonl
  max_text_chars: 600
  max_list_items: 20

symbolic:
  domain_aliases: clc=CLC,csd=CSD,g-cl=G-CL,gcl=G-CL,geometry controller=OpenClaw,lcm geometry=OpenClaw,openclaw=OpenClaw,clgk=CLGK,robot=robotics,webots=robotics,lora=model_training,memory=agent_memory
  preference_keywords: prefer,preference,likes,loves,hates,dislikes,values,wants
  design_rule_keywords: should,must,design
  procedure_keywords: how to,steps
  intent_labels: work=working on|work on|project|building|developing|development;presentation=information presented|presented|presentation|transparency|honesty|source clarity|sources|vague authority|conclusions without source;food_drink=drink|drinks|coffee|espresso|tea|eat|eats|pizza|food;preference=preference|prefer|likes|loves|hates|dislikes|values|wants
  disabled_domain_aliases: none

llm:
  enabled: false
  provider: custom
  model: glm-5
  fallback_models: none
  api_key_env: OPENCODE_GO_API_KEY
  base_url: https://opencode.ai/zen/go/v1
  temperature: 0.1
  max_tokens: 2048
  timeout: 30
  user_agent: CLC-GCL-Memory/1.0
  max_retries: 2
  retry_backoff: 1.5
  chunk_delay: 1.5
  continue_on_error: true
  max_facts_per_call: 5
  min_fact_length: 15
  duplicate_threshold: 0.85
  correction_threshold: 0.60
  min_confidence: 0.70
