database_path: memory_experiment_180_best.db
embedding_dim: 768
logs_dir: logs
top_k: 8

server:
  host: 127.0.0.1
  port: 8765

embedding:
  backend: wsl_llama_cpp
  model_name: embeddinggemma-300M-Q8_0.gguf
  gguf_path: "\\wsl.localhost\\Ubuntu\\home\\victo\\models\\embeddinggemma-300M-Q8_0.gguf"
  wsl_model_path: /home/victo/models/embeddinggemma-300M-Q8_0.gguf
  gguf_n_ctx: 2048
  gguf_n_threads: 8
  wsl_python: /home/victo/.openclaw/workspace/module/.venv_mlcpu/bin/python
  dim: 768
  normalize: true
  max_text_chars: 1000
  sidecar: true
  cache_path: logs/embedding_cache.sqlite
  allow_hash_fallback: false

thresholds:
  low: 0.5
  new: 1.5
  recall_low: 0.45
  recall_mid: 0.65
  recall_high: 0.82
  contradiction: 0.75
  domain_shift: 0.60
  focus: 0.68
  information_gain: 0.45

gcl:
  base_update_rate: 0.18
  drift_beta: 0.95
  curvature_beta: 0.95
  angular_weight: 0.50
  radial_weight: 0.05
  orthogonal_weight: 0.35

retrieval_weights:
  vector: 0.38
  importance: 0.08
  stability: 0.08
  domain: 0.08
  text: 0.12
  intent: 0.14
  source: 0.18
  feedback: 0.10
  domain_reliability: 0.03
  source_reliability: 0.03
  supersession: 0.14
  relation_supersession: 0.16
  summary_relation: 0.08
  correction_chain: 0.12
  claim_scope: 0.14
  answer_type: 0.16

canonical_memory:
  enabled: true
  support_weight: 0.08
  duplicate_penalty: 0.18
  support_reference_count: 10
  lexical_backfill_enabled: true
  lexical_backfill_min_affinity: 0.75
  lexical_backfill_max_additions: 20

ogcf_intent:
  bridge_terms: bridge,cross-domain,cross domain,connect,connection,routing,router,selector refresh,refresh policy,policy,synthesis
  geometry_terms: ogcf,geometry,geometric,embedding,embeddings,cluster,clusters,overload,loop,loops,defect,interaction
  maintenance_terms: cleanup,clean up,dedup,duplicate,maintenance,stale,current,correct,correction,conflict,supersede,superseded
  ordinary_fact_terms: what is,what was,what does,when is,where does,does victor,prefer,drink,calendar,scheduled,robot,routine,codename,weather checks
  scores:
    bridge_geometry_query: 1.0
    cross_domain_geometry_synthesis: 0.88
    cross_domain_bridge_synthesis: 0.78
    memory_maintenance: 0.72
    ordinary_fact_lookup: 0.18
    bridge_evidence_context: 0.55
    weak_geometry_context: 0.42
    ordinary_context: 0.25
  gate:
    high_intent_threshold: 0.75
    medium_intent_threshold: 0.55
    high_affected_multiplier: 0.75
    medium_min_weighted_ratio: 0.35
    low_min_weighted_ratio: 0.55

selector:
  mode: learned
  k: 3
  matrix_report: selector_reports/clc_selector_guarded_continual_training_report.json
  outcome_log: ../experiments/hermes_clc_selector_outcome_labels.jsonl
  label_cost_ceiling: 0.00025
  high_budget_pressure: 0.9

claim_scope:
  stopwords: about,check,checks,current,currently,does,for,from,help,helps,latest,prefer,prefers,preference,remember,should,that,the,use,what,when,where,which,who,with,victor,hermes,project
  slot_aliases:
    drink: drink,water,sparkling,espresso,tea,coffee,beverage
    pizza: pizza,cheese,mushroom,pepperoni
    method: method,tool,url,accuweather,radar,checks
    codename: codename,cedar,alpha
    status: status,stable,blocked,ready
    backend_port: backend,port,8765
    github_upload: github,upload,uploads,confirmation,explicitly,requested,requests
    calendar_change: calendar,schedule,change,changing,meeting,events,manual,approval
    gcl_curvature: gcl,g-cl,domain,geometry,anchor,drift,curvature,stability
    csd: csd,novelty,contradiction,semantic,density,domain shift,detect
    deadline: deadline,due,friday,deadline_report
  excluded_terms:
    method: filename
    backend_port: host,remain,127,local,testing
    github_upload: calendar,schedule,meeting,broad,note,documented
    calendar_change: github,upload,uploads,broad,note,documented
    gcl_curvature: csd,backend,port,filename,report
    csd: gcl,g-cl,backend,port,filename,report
    deadline: owner,owns,mina,filename,file

answer_type:
  rules:
    owner_relation:
      query_terms: owner,owners,owns,assignee,assigned,assignment,responsible,accountable,responsibility
      positive_terms: owner,owners,owns,owned,assignee,assigned,assignment,responsible,accountable,responsibility
      negative_terms: deadline,due,friday,monday,tuesday,wednesday,thursday,saturday,sunday,today,tomorrow
      positive_score: 1.0
      negative_score: -1.0
    deadline:
      query_terms: deadline,due
      positive_terms: due,friday,monday,tuesday,wednesday,thursday,saturday,sunday,today,tomorrow
      negative_terms: owner,owners,owns,owned,assignee,assigned,assignment,responsible,accountable,responsibility
      negative_requires_absent: due,friday,monday,tuesday,wednesday,thursday,saturday,sunday,today,tomorrow
      positive_score: 1.0
      negative_score: -1.0
    method_choice:
      query_terms: method,tool
      positive_terms: method,tool,url,choice,required,accuweather
      negative_terms: filename,file,report
      negative_requires_absent: method,tool,url,choice,required
      positive_score: 1.0
      negative_score: -1.0
    report_filename:
      query_terms: filename,file
      positive_terms: filename,file,report,md
      positive_requires_any: filename,file,md
      negative_terms: method,tool,url,choice,required
      negative_requires_absent: filename,file,report,md
      positive_score: 1.0
      negative_score: -1.0
    github_upload_policy:
      query_terms: github,repository,repo,upload,uploads,uploading,publish,publishing,permission
      query_excludes_any: filename,file,report
      query_excludes_unless_any: permission,rule,automatic,automatically,approval,approve,confirmation,publish,publishing
      positive_terms: github,repository,repo,upload,uploads,uploading,publish,publishing,permission,confirmation,explicitly,requested,requests,conversation
      positive_requires_any: github,repository,repo,upload,uploads,uploading,publish,publishing,permission,confirmation
      negative_terms: calendar,schedule,meeting,meetings,event,events,change,changing,filename,file,report,issue,issues,note,notes,draft,drafts,release,blockers
      negative_requires_absent: confirmation,explicitly,requested,requests,conversation
      positive_score: 1.0
      negative_score: -1.0
    calendar_change_policy:
      query_terms: calendar,schedule,meeting,meetings,event,events,change,changing
      positive_terms: calendar,schedule,meeting,meetings,event,events,change,changing,manual
      positive_requires_any: calendar,schedule,meeting,meetings,event,events,change,changing,manual
      negative_terms: github,repository,upload,uploads,uploading
      positive_score: 1.0
      negative_score: -1.0
    broad_policy_note:
      query_terms: broad,general,overall,policy,note,notes,approval,approvals,logged,log,record,recorded,documented
      query_requires_any: approval,approvals,logged,log,record,recorded,documented
      positive_terms: broad,general,overall,policy,note,notes,approval,approvals,documented,change,log
      positive_requires_any: broad,general,overall,policy,note,notes,documented,log
      negative_terms: calendar,schedule,meeting,meetings,event,events,github,repository,repo,upload,uploads,uploading,filename,file,report,archive,audit,history,stored,entries,decision
      negative_requires_absent: broad,general,overall,documented,log
      positive_score: 1.0
      negative_score: -1.0

retrieval_signals:
  broad_generic:
    source_contains: broad_policy,general_policy
    text_prefixes: broad policy note,general policy note
    penalty: 0.18
  scope_deflection:
    query_terms: policy,permission,approval,approve,upload,github,repo,publish,calendar,meeting,event,change,changing,reschedule
    correction_prefixes: "correction:"
    text_markers: not permission,not upload permission,not authorized,not authorize,do not authorize,does not authorize,separate policy,separate calendar policy,still follows the separate
    penalty: 0.55
  correction_relevance:
    match_threshold: 0.75
    min_relevance: 0.15

evidence_states:
  current_threshold: 0.30
  stale_threshold: -0.25
  stale_feedback_threshold: -0.50
  disputed_feedback_threshold: -0.20
  stale_language_terms: not final truth,marked stale,stale memory,superseded,no longer current,historical but no longer current
  stale_regex: \bold\s+(policy|memory|fact|rule|preference|profile|deployment|geometry|evidence|version|value)\b
  correction_language_terms: "correction:,must not,only when,prefer the corrected,no longer current"
  sensitive_lookup_terms: address,email,key,license,passport,password,phone,private,secret,signing,ssn,token
  weak_evidence:
    score_threshold: 0.20
    text_match_threshold: 0.50
    intent_match_threshold: 0.80
    intent_text_match_threshold: 0.30

outcome_log:
  enabled: true
  path: logs/memory_outcomes.jsonl
  max_text_chars: 600
  max_list_items: 20

symbolic:
  domain_aliases: clc=CLC,csd=CSD,g-cl=G-CL,gcl=G-CL,geometry controller=OpenClaw,lcm geometry=OpenClaw,openclaw=OpenClaw,clgk=CLGK,robot=robotics,webots=robotics,lora=model_training,memory=agent_memory
  preference_keywords: prefer,preference,likes,loves,hates,dislikes,values,wants
  design_rule_keywords: should,must,design
  procedure_keywords: how to,steps
  intent_labels: work=working on|work on|project|building|developing|development;presentation=information presented|presented|presentation|transparency|honesty|source clarity|sources|vague authority|conclusions without source;food_drink=drink|drinks|coffee|espresso|tea|eat|eats|pizza|food;preference=preference|prefer|likes|loves|hates|dislikes|values|wants
  disabled_domain_aliases: none

llm:
  enabled: false
  provider: custom
  model: glm-5
  fallback_models: none
  api_key_env: OPENCODE_GO_API_KEY
  base_url: https://opencode.ai/zen/go/v1
  temperature: 0.1
  max_tokens: 2048
  timeout: 30
  user_agent: CLC-GCL-Memory/1.0
  max_retries: 2
  retry_backoff: 1.5
  chunk_delay: 1.5
  continue_on_error: true
  max_facts_per_call: 5
  min_fact_length: 15
  duplicate_threshold: 0.85
  correction_threshold: 0.60
  min_confidence: 0.70
